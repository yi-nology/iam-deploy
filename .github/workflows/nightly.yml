name: Nightly Build

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

permissions:
  packages: write

jobs:
  check-and-build:
    name: Check & Build
    runs-on: ubuntu-latest
    outputs:
      server_changed: ${{ steps.check.outputs.server_changed }}
      web_changed: ${{ steps.check.outputs.web_changed }}
    steps:
      - name: Check iam-server changes
        id: check-server
        run: |
          LATEST_SHA=$(git ls-remote https://oauth2:${{ secrets.GITCODE_TOKEN }}@gitcode.com/yi-nology/iam-server.git HEAD | awk '{print $1}')
          echo "sha=${LATEST_SHA}" >> $GITHUB_OUTPUT
          echo "Latest iam-server SHA: ${LATEST_SHA}"

      - name: Check iam-web changes
        id: check-web
        run: |
          LATEST_SHA=$(git ls-remote https://oauth2:${{ secrets.GITCODE_TOKEN }}@gitcode.com/yi-nology/iam-web.git HEAD | awk '{print $1}')
          echo "sha=${LATEST_SHA}" >> $GITHUB_OUTPUT
          echo "Latest iam-web SHA: ${LATEST_SHA}"

      - name: Cache last known SHAs
        id: cache
        uses: actions/cache@v4
        with:
          path: /tmp/last-shas
          key: last-shas-${{ github.run_id }}
          restore-keys: last-shas-

      - name: Detect changes
        id: check
        run: |
          SERVER_CHANGED="true"
          WEB_CHANGED="true"

          if [ -f /tmp/last-shas/server-sha ]; then
            OLD_SERVER=$(cat /tmp/last-shas/server-sha)
            if [ "$OLD_SERVER" = "${{ steps.check-server.outputs.sha }}" ]; then
              SERVER_CHANGED="false"
            fi
          fi

          if [ -f /tmp/last-shas/web-sha ]; then
            OLD_WEB=$(cat /tmp/last-shas/web-sha)
            if [ "$OLD_WEB" = "${{ steps.check-web.outputs.sha }}" ]; then
              WEB_CHANGED="false"
            fi
          fi

          echo "server_changed=${SERVER_CHANGED}" >> $GITHUB_OUTPUT
          echo "web_changed=${WEB_CHANGED}" >> $GITHUB_OUTPUT

          mkdir -p /tmp/last-shas
          echo "${{ steps.check-server.outputs.sha }}" > /tmp/last-shas/server-sha
          echo "${{ steps.check-web.outputs.sha }}" > /tmp/last-shas/web-sha

  build-server:
    name: Build iam-server (nightly)
    needs: check-and-build
    if: needs.check-and-build.outputs.server_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Clone iam-server from GitCode
        run: |
          git clone --depth 1 \
            https://oauth2:${{ secrets.GITCODE_TOKEN }}@gitcode.com/yi-nology/iam-server.git iam-server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push iam-server
        uses: docker/build-push-action@v6
        with:
          context: iam-server
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/iam-server:nightly
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/iam-server:nightly-${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build iam-web (nightly)
    needs: check-and-build
    if: needs.check-and-build.outputs.web_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Clone iam-web from GitCode
        run: |
          git clone --depth 1 \
            https://oauth2:${{ secrets.GITCODE_TOKEN }}@gitcode.com/yi-nology/iam-web.git iam-web

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push iam-web
        uses: docker/build-push-action@v6
        with:
          context: iam-web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/iam-web:nightly
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/iam-web:nightly-${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
