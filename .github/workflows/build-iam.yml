name: Build IAM Projects

on:
  workflow_dispatch:
    inputs:
      iam_server_ref:
        description: 'iam-server branch/tag'
        required: false
        default: 'main'
      iam_web_ref:
        description: 'iam-web branch/tag'
        required: false
        default: 'main'
      push_images:
        description: 'Push images to registry'
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

permissions:
  packages: write

jobs:
  build-server:
    name: Build iam-server
    runs-on: ubuntu-latest
    steps:
      - name: Clone iam-server from GitCode
        run: |
          git clone --depth 1 --branch ${{ inputs.iam_server_ref }} \
            https://oauth2:${{ secrets.GITCODE_TOKEN }}@gitcode.com/yi-nology/iam-server.git iam-server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: inputs.push_images == true
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/iam-server
          tags: |
            type=raw,value=${{ inputs.iam_server_ref }}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ inputs.iam_server_ref == 'main' }}

      - name: Build & Push iam-server
        uses: docker/build-push-action@v6
        with:
          context: iam-server
          push: ${{ inputs.push_images }}
          load: ${{ inputs.push_images == false }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ inputs.iam_server_ref }}
            BUILD_TIME=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
            GIT_COMMIT=${{ github.sha }}
            GITCODE_TOKEN=${{ secrets.GITCODE_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build iam-web
    runs-on: ubuntu-latest
    steps:
      - name: Clone iam-web from GitCode
        run: |
          git clone --depth 1 --branch ${{ inputs.iam_web_ref }} \
            https://oauth2:${{ secrets.GITCODE_TOKEN }}@gitcode.com/yi-nology/iam-web.git iam-web

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: inputs.push_images == true
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/iam-web
          tags: |
            type=raw,value=${{ inputs.iam_web_ref }}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ inputs.iam_web_ref == 'main' }}

      - name: Build & Push iam-web
        uses: docker/build-push-action@v6
        with:
          context: iam-web
          push: ${{ inputs.push_images }}
          load: ${{ inputs.push_images == false }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ inputs.iam_web_ref }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
