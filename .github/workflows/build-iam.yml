name: Build IAM Projects

on:
  workflow_dispatch:
    inputs:
      iam_server_ref:
        description: 'iam-server branch/tag'
        required: false
        default: 'main'
      iam_web_ref:
        description: 'iam-web branch/tag'
        required: false
        default: 'main'
      push_images:
        description: 'Push images to registry'
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

permissions:
  packages: write

jobs:
  build-server:
    name: Build iam-server
    runs-on: ubuntu-latest
    steps:
      - name: Clone iam-server from GitCode
        run: |
          git clone --depth 1 --branch ${{ inputs.iam_server_ref }} \
            https://oauth2:${{ secrets.GITCODE_TOKEN }}@gitcode.com/yi-nology/iam-server.git iam-server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: inputs.push_images == true
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/iam-server
          tags: |
            type=raw,value=${{ inputs.iam_server_ref }}
            type=sha,prefix=

      - name: Build & Push iam-server
        uses: docker/build-push-action@v6
        with:
          context: iam-server
          push: ${{ inputs.push_images }}
          load: ${{ inputs.push_images == false }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build iam-web
    runs-on: ubuntu-latest
    steps:
      - name: Clone iam-web from GitCode
        run: |
          git clone --depth 1 --branch ${{ inputs.iam_web_ref }} \
            https://oauth2:${{ secrets.GITCODE_TOKEN }}@gitcode.com/yi-nology/iam-web.git iam-web

      - name: Patch Dockerfile for CI
        run: |
          cd iam-web
          cat > Dockerfile.ci <<'EOF'
          FROM node:22-alpine AS builder

          RUN corepack enable && corepack prepare pnpm@latest --activate

          WORKDIR /app

          COPY . .

          ENV IS_CI=true
          ENV HUSKY=0

          RUN pnpm install --frozen-lockfile

          RUN pnpm build:antd

          FROM nginx:1.25-alpine

          COPY --from=builder /app/apps/web-antd/dist /usr/share/nginx/html
          COPY nginx.conf /etc/nginx/conf.d/default.conf

          EXPOSE 80

          CMD ["nginx", "-g", "daemon off;"]
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: inputs.push_images == true
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/iam-web
          tags: |
            type=raw,value=${{ inputs.iam_web_ref }}
            type=sha,prefix=

      - name: Build & Push iam-web
        uses: docker/build-push-action@v6
        with:
          context: iam-web
          file: iam-web/Dockerfile.ci
          push: ${{ inputs.push_images }}
          load: ${{ inputs.push_images == false }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
